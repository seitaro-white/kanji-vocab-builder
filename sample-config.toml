# Kanji Vocab Miner Configuration
#
# Copy this file to ~/.config/kanji-vocab-miner/config.toml to customize settings.
# All settings are optional - the tool will use these defaults if not specified.
#
# Note: The vocabulary deck and note type are created automatically by the
# 'kanji-vocab-miner setup' command and do not need to be configured.

[ankiconnect]
# AnkiConnect URL (requires Anki running with AnkiConnect plugin)
url = "http://localhost:8765"

[kanji_deck]
# Name of the Anki deck containing kanji cards
# Default assumes "All in One Kanji" deck from AnkiWeb
name = "All in One Kanji"
